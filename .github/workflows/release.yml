name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release versions
        shell: pwsh
        run: |
          $packageVersion = (Get-Content 'package.json' | ConvertFrom-Json).version
          $tauriVersion = (Get-Content 'src-tauri/tauri.conf.json' | ConvertFrom-Json).version
          $cargoVersionMatch = Select-String -Path 'src-tauri/Cargo.toml' -Pattern '^version = "([^"]+)"$'
          if (-not $cargoVersionMatch) {
            throw 'Could not read version from src-tauri/Cargo.toml'
          }
          $cargoVersion = $cargoVersionMatch.Matches[0].Groups[1].Value
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''

          $versions = @($packageVersion, $tauriVersion, $cargoVersion, $tagVersion) | Select-Object -Unique
          if ($versions.Count -ne 1) {
            throw "Release versions are misaligned. package.json=$packageVersion, tauri.conf.json=$tauriVersion, Cargo.toml=$cargoVersion, tag=$tagVersion"
          }

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy lint
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Security audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked --version 0.22.1
          cargo audit

      - name: Run frontend tests
        run: npm run test

      - name: Lint frontend
        run: npm run lint

      - name: Load release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = (Get-Content 'package.json' | ConvertFrom-Json).version
          $releaseNotesPath = "docs/releases/v$version.md"

          if (-not (Test-Path $releaseNotesPath)) {
            throw "Missing release notes file: $releaseNotesPath"
          }

          $body = Get-Content $releaseNotesPath -Raw
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'FamVoice v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false

      - name: Verify updater endpoint is publicly reachable
        shell: pwsh
        run: |
          $config = Get-Content 'src-tauri/tauri.conf.json' | ConvertFrom-Json
          $version = (Get-Content 'package.json' | ConvertFrom-Json).version
          $endpoint = $config.plugins.updater.endpoints[0]

          if (-not $endpoint) {
            throw "No updater endpoint configured in src-tauri/tauri.conf.json"
          }

          try {
            $response = Invoke-WebRequest -Uri $endpoint -UseBasicParsing -MaximumRedirection 5
          } catch {
            throw "Updater endpoint '$endpoint' is not anonymously reachable after release. If you are using GitHub Releases, private repositories return 404 to end users and Tauri auto-update will not work."
          }

          if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 300) {
            throw "Updater endpoint '$endpoint' returned HTTP $($response.StatusCode). End users need anonymous access to latest.json for Tauri auto-update to work."
          }

          $latestJsonContent = if ($response.Content -is [byte[]]) {
            [System.Text.Encoding]::UTF8.GetString($response.Content)
          } else {
            [string]$response.Content
          }

          $latestJson = $latestJsonContent | ConvertFrom-Json

          if ($latestJson.version -ne $version) {
            throw "Updater endpoint '$endpoint' published version '$($latestJson.version)', expected '$version'."
          }

          $requiredTargets = @('windows-x86_64', 'windows-x86_64-msi', 'windows-x86_64-nsis')
          foreach ($target in $requiredTargets) {
            if (-not $latestJson.platforms.PSObject.Properties.Name.Contains($target)) {
              throw "Updater endpoint '$endpoint' is missing required target '$target'."
            }
          }
